<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes Viewer — RTUKaGyan</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked-katex-extension/lib/index.umd.js"></script>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #07090f;
            --surface: #0d1117;
            --panel: #111827;
            --border: rgba(255, 255, 255, 0.07);
            --border-hi: rgba(255, 255, 255, 0.13);
            --ink: #e2e8f0;
            --ink-muted: #64748b;
            --ink-faint: #1e293b;
            --accent: #22d3ee;
            --accent2: #818cf8;
            --accent-glow: rgba(34, 211, 238, 0.18);
            --user-msg: #161d2b;
            --ai-msg: #0d1a1f;
        }

        html,
        body {
            height: 100%;
            width: 100%;
            overflow: hidden;
        }

        body {
            background: var(--bg);
            color: var(--ink);
            font-family: 'DM Sans', sans-serif;
            display: flex;
            flex-direction: column;
        }

        /* ── Loading overlay ─────────────────────────────────────── */
        #loadingOverlay {
            position: fixed;
            inset: 0;
            z-index: 300;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            transition: opacity 0.5s ease, visibility 0.5s;
        }

        #loadingOverlay .spinner-ring {
            width: 64px;
            height: 64px;
            border: 2px solid var(--ink-faint);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
        }

        #loadingOverlay .logo-inner {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #loadingOverlay .load-label {
            font-family: 'Space Mono', monospace;
            font-size: 10px;
            letter-spacing: 0.3em;
            color: var(--accent);
            text-transform: uppercase;
        }

        #loadingOverlay .load-sub {
            font-size: 12px;
            color: var(--ink-muted);
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ── Ambient bg blobs ────────────────────────────────────── */
        .ambient {
            pointer-events: none;
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.25;
        }

        .blob-1 {
            width: 500px;
            height: 500px;
            top: -200px;
            right: -100px;
            background: radial-gradient(circle, #22d3ee 0%, transparent 70%);
        }

        .blob-2 {
            width: 400px;
            height: 400px;
            bottom: -150px;
            left: -80px;
            background: radial-gradient(circle, #818cf8 0%, transparent 70%);
        }

        /* ── Header ──────────────────────────────────────────────── */
        header {
            position: relative;
            z-index: 100;
            height: 60px;
            flex-shrink: 0;
            background: rgba(13, 17, 23, 0.92);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 12px;
        }

        .header-logo {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            object-fit: contain;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .header-logo:hover {
            opacity: 0.7;
        }

        .header-brand {
            display: flex;
            flex-direction: column;
            gap: 1px;
        }

        .brand-name {
            font-family: 'Syne', sans-serif;
            font-size: 15px;
            font-weight: 800;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
        }

        #viewerTitle {
            font-family: 'Space Mono', monospace;
            font-size: 9px;
            color: var(--ink-muted);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            max-width: 220px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .header-spacer {
            flex: 1;
        }

        .hbtn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.18s, border-color 0.18s;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--ink-muted);
            font-family: 'DM Sans', sans-serif;
            text-decoration: none;
        }

        .hbtn:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: var(--border-hi);
            color: var(--ink);
        }

        .hbtn-primary {
            color: var(--accent);
            border-color: rgba(34, 211, 238, 0.3);
        }

        .hbtn-primary:hover {
            background: rgba(34, 211, 238, 0.08);
            border-color: rgba(34, 211, 238, 0.5);
            color: var(--accent);
        }

        .hbtn svg {
            width: 13px;
            height: 13px;
        }

        /* ── Main layout ─────────────────────────────────────────── */
        main {
            flex: 1;
            display: flex;
            overflow: hidden;
            position: relative;
            z-index: 1;
        }

        /* ── Viewer pane ─────────────────────────────────────────── */
        .viewer-pane {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 50vh;
            border-right: 1px solid var(--border);
            background: rgba(7, 9, 15, 0.6);
        }

        /* Toolbar */
        .viewer-toolbar {
            flex-shrink: 0;
            height: 48px;
            display: flex;
            align-items: center;
            padding: 0 16px;
            gap: 8px;
            background: rgba(13, 17, 23, 0.9);
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(12px);
        }

        .tbtn {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--ink);
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s;
            font-size: 14px;
            font-weight: 600;
        }

        .tbtn:hover {
            background: var(--panel);
            border-color: var(--border-hi);
        }

        .tbtn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .tbtn svg {
            width: 14px;
            height: 14px;
        }

        .tb-divider {
            width: 1px;
            height: 20px;
            background: var(--border);
            flex-shrink: 0;
        }

        .tb-indicator {
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            color: var(--ink-muted);
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 4px 12px;
            min-width: 70px;
            text-align: center;
            white-space: nowrap;
        }

        .tb-drag-hint {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 10px;
            font-family: 'Space Mono', monospace;
            color: rgba(34, 211, 238, 0.5);
            letter-spacing: 0.1em;
        }

        .tb-drag-hint svg {
            width: 12px;
            height: 12px;
        }

        /* Canvas scroll area */
        #viewerScrollArea {
            flex: 1;
            overflow: auto;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 32px;
            background: transparent;
        }

        #viewerScrollArea::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        #viewerScrollArea::-webkit-scrollbar-track {
            background: transparent;
        }

        #viewerScrollArea::-webkit-scrollbar-thumb {
            background: rgba(100, 116, 139, 0.3);
            border-radius: 10px;
        }

        #viewerScrollArea::-webkit-scrollbar-thumb:hover {
            background: rgba(100, 116, 139, 0.6);
        }

        #notesViewerCanvasWrap {
            position: relative;
            display: inline-block;
            border-radius: 12px;
            border: 1px solid var(--border);
            box-shadow: 0 0 80px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(255, 255, 255, 0.04) inset;
            cursor: crosshair;
            user-select: none;
            background: var(--surface);
            transition: box-shadow 0.2s;
        }

        #notesViewerCanvasWrap:hover {
            box-shadow: 0 0 100px rgba(0, 0, 0, 0.8), 0 0 40px rgba(34, 211, 238, 0.04);
        }

        #notesViewerCanvas {
            display: block;
            border-radius: 12px;
        }

        #notesSelectionBox {
            pointer-events: none !important;
            position: absolute !important;
            border: 1.5px solid var(--accent) !important;
            background: rgba(34, 211, 238, 0.1) !important;
            box-shadow: 0 0 20px rgba(34, 211, 238, 0.2) inset !important;
            z-index: 100 !important;
            border-radius: 4px;
        }

        #notesSelectionBadge {
            pointer-events: none !important;
            position: absolute !important;
            background: var(--accent) !important;
            color: #07090f !important;
            font-family: 'Space Mono', monospace !important;
            font-size: 9px !important;
            font-weight: 700 !important;
            padding: 2px 7px !important;
            border-radius: 4px !important;
            z-index: 101 !important;
        }

        /* ── Sidebar ─────────────────────────────────────────────── */
        aside {
            width: 420px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            height: 50vh;
            background: var(--surface);
            border-left: 1px solid var(--border);
            position: relative;
            z-index: 2;
            overflow: hidden;
        }

        /* Sidebar header */
        .sb-header {
            flex-shrink: 0;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            background: rgba(13, 17, 23, 0.85);
            backdrop-filter: blur(16px);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .sb-title {
            font-family: 'Syne', sans-serif;
            font-size: 13px;
            font-weight: 700;
            color: var(--ink);
        }

        .sb-subtitle {
            font-family: 'Space Mono', monospace;
            font-size: 9px;
            color: var(--ink-muted);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-top: 2px;
        }

        #notesAnswerStatus {
            font-family: 'Space Mono', monospace;
            font-size: 9px;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 6px;
            background: var(--panel);
            color: var(--ink-muted);
            border: 1px solid var(--border);
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        /* Sidebar scroll body */
        .sb-body {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .sb-body::-webkit-scrollbar {
            width: 4px;
        }

        .sb-body::-webkit-scrollbar-track {
            background: transparent;
        }

        .sb-body::-webkit-scrollbar-thumb {
            background: rgba(100, 116, 139, 0.3);
            border-radius: 10px;
        }

        /* Cards */
        .sb-card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px;
        }

        .sb-card-label {
            font-family: 'Space Mono', monospace;
            font-size: 9px;
            font-weight: 700;
            color: var(--ink-muted);
            text-transform: uppercase;
            letter-spacing: 0.18em;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 10px;
        }

        .sb-card-label svg {
            width: 11px;
            height: 11px;
        }

        /* Selection preview */
        .selection-preview-box {
            height: 110px;
            border-radius: 8px;
            background: rgba(7, 9, 15, 0.6);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        #notesSelectionPreview {
            height: 100%;
            width: 100%;
            object-fit: contain;
            padding: 8px;
        }

        #notesSelectionEmpty {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            opacity: 0.25;
        }

        #notesSelectionEmpty svg {
            width: 28px;
            height: 28px;
            color: var(--ink-muted);
        }

        #notesSelectionEmpty p {
            font-family: 'Space Mono', monospace;
            font-size: 9px;
            color: var(--ink-muted);
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .clear-btn {
            font-family: 'Space Mono', monospace;
            font-size: 9px;
            color: var(--ink-muted);
            background: transparent;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            padding: 3px 8px;
            border-radius: 6px;
            transition: color 0.15s, background 0.15s;
            margin-left: auto;
        }

        .clear-btn:hover {
            color: var(--ink);
            background: var(--surface);
        }

        .clear-btn-danger {
            color: rgba(251, 113, 133, 0.5);
        }

        .clear-btn-danger:hover {
            color: rgb(251, 113, 133);
            background: rgba(251, 113, 133, 0.06);
        }

        /* Query textarea */
        .query-area textarea {
            width: 100%;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: rgba(7, 9, 15, 0.8);
            padding: 10px 14px;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            color: var(--ink);
            resize: none;
            outline: none;
            transition: border-color 0.18s, box-shadow 0.18s;
            line-height: 1.5;
        }

        .query-area textarea::placeholder {
            color: var(--ink-muted);
        }

        .query-area textarea:focus {
            border-color: rgba(34, 211, 238, 0.35);
            box-shadow: 0 0 0 3px rgba(34, 211, 238, 0.06);
        }

        .query-area textarea::-webkit-scrollbar {
            width: 4px;
        }

        .query-area textarea::-webkit-scrollbar-thumb {
            background: rgba(100, 116, 139, 0.3);
            border-radius: 4px;
        }

        #notesAskBtn {
            margin-top: 10px;
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #07090f;
            font-family: 'Syne', sans-serif;
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            border: none;
            cursor: pointer;
            transition: opacity 0.18s, transform 0.12s;
            box-shadow: 0 4px 20px rgba(34, 211, 238, 0.2);
        }

        #notesAskBtn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        #notesAskBtn:active {
            transform: translateY(0);
        }

        #notesAskBtn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none;
        }

        /* Chat area */
        .chat-card {
            flex: 1;
            min-height: 300px;
            display: flex;
            flex-direction: column;
        }

        #notesAnswerBox {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-height: 0;
            padding-right: 4px;
            margin-bottom: 12px;
        }

        #notesAnswerBox::-webkit-scrollbar {
            width: 3px;
        }

        #notesAnswerBox::-webkit-scrollbar-thumb {
            background: rgba(100, 116, 139, 0.3);
            border-radius: 3px;
        }

        .chat-empty {
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            opacity: 0.3;
            text-align: center;
        }

        .chat-empty svg {
            width: 36px;
            height: 36px;
            color: var(--ink-faint);
        }

        .chat-empty span {
            font-family: 'Space Mono', monospace;
            font-size: 10px;
            color: var(--ink-muted);
            text-transform: uppercase;
            letter-spacing: 0.15em;
        }

        .chat-msg {
            padding: 12px 14px;
            border-radius: 10px;
            font-size: 13px;
            line-height: 1.6;
            animation: fadeSlideIn 0.25s ease;
        }

        @keyframes fadeSlideIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .chat-msg-role {
            font-family: 'Space Mono', monospace;
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .chat-msg-user {
            background: var(--user-msg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin-left: 24px;
        }

        .chat-msg-user .chat-msg-role {
            color: var(--ink-muted);
        }

        .chat-msg-ai {
            background: var(--ai-msg);
            border: 1px solid rgba(34, 211, 238, 0.12);
            margin-right: 24px;
        }

        .chat-msg-ai .chat-msg-role {
            color: var(--accent);
        }

        .chat-msg-loading {
            background: var(--ai-msg);
            border: 1px solid rgba(34, 211, 238, 0.1);
            margin-right: 24px;
            color: rgba(34, 211, 238, 0.4);
            font-style: italic;
        }

        .loading-dots {
            display: inline-flex;
            gap: 4px;
            margin-left: 6px;
            vertical-align: middle;
        }

        .loading-dots span {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--accent);
            display: inline-block;
            animation: dotBounce 1s ease infinite;
        }

        .loading-dots span:nth-child(2) {
            animation-delay: 0.15s;
        }

        .loading-dots span:nth-child(3) {
            animation-delay: 0.3s;
        }

        @keyframes dotBounce {

            0%,
            100% {
                transform: translateY(0);
                opacity: 0.5;
            }

            50% {
                transform: translateY(-4px);
                opacity: 1;
            }
        }

        /* Chat input row */
        .chat-input-row {
            flex-shrink: 0;
            display: flex;
            align-items: flex-end;
            gap: 8px;
            border-top: 1px solid var(--border);
            padding-top: 12px;
        }

        .chat-input-row textarea {
            flex: 1;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: rgba(7, 9, 15, 0.8);
            padding: 9px 12px;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            color: var(--ink);
            resize: none;
            outline: none;
            line-height: 1.5;
            transition: border-color 0.18s;
            max-height: 120px;
        }

        .chat-input-row textarea::placeholder {
            color: var(--ink-muted);
        }

        .chat-input-row textarea:focus {
            border-color: rgba(34, 211, 238, 0.3);
        }

        .chat-input-row textarea::-webkit-scrollbar {
            width: 3px;
        }

        .chat-input-row textarea::-webkit-scrollbar-thumb {
            background: rgba(100, 116, 139, 0.3);
            border-radius: 3px;
        }

        .send-btn {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            background: rgba(34, 211, 238, 0.1);
            border: 1px solid rgba(34, 211, 238, 0.2);
            color: var(--accent);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s, transform 0.1s;
            flex-shrink: 0;
        }

        .send-btn:hover {
            background: rgba(34, 211, 238, 0.18);
            transform: translateY(-1px);
        }

        .send-btn:active {
            transform: translateY(0);
        }

        .send-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none;
        }

        .send-btn svg {
            width: 15px;
            height: 15px;
        }

        /* ── Responsive ──────────────────────────────────────────── */
        @media (min-width: 1280px) {
            main {
                flex-direction: row;
            }

            .viewer-pane {
                min-height: 0;
            }

            aside {
                width: 440px;
                height: auto;
            }
        }

        @media (max-width: 768px) {
            .tb-drag-hint {
                display: none;
            }

            aside {
                width: 100%;
            }

            #viewerScrollArea {
                padding: 16px;
            }
        }

        .notes-chat-message.ai {
            align-self: flex-start;
            background: var(--ai-msg);
            border-bottom-left-radius: 4px;
        }

        /* Markdown Styles */
        .markdown-body {
            font-size: 14px;
            line-height: 1.6;
        }

        .markdown-body p { margin-bottom: 12px; }
        .markdown-body p:last-child { margin-bottom: 0; }
        .markdown-body ul, .markdown-body ol { margin-left: 20px; margin-bottom: 12px; }
        .markdown-body li { margin-bottom: 4px; }
        .markdown-body strong { color: var(--accent); }
        .markdown-body code {
            background: var(--surface);
            padding: 2px 4px;
            border-radius: 4px;
            font-family: 'Space Mono', monospace;
            font-size: 12px;
        }
        .markdown-body pre {
            background: var(--surface);
            padding: 12px;
            border-radius: 8px;
            overflow-x: auto;
            margin-bottom: 12px;
            border: 1px solid var(--border);
        }
        .markdown-body pre code { background: transparent; padding: 0; }
        .markdown-body blockquote {
            border-left: 3px solid var(--accent);
            padding-left: 12px;
            color: var(--ink-muted);
            margin-bottom: 12px;
        }
        .markdown-body h1, .markdown-body h2, .markdown-body h3 {
            color: var(--accent2);
            margin: 16px 0 8px 0;
            font-family: 'Syne', sans-serif;
        }
        .markdown-body h1 { font-size: 1.25rem; }
        .markdown-body h2 { font-size: 1.1rem; }
        .markdown-body h3 { font-size: 1rem; }
        /* Selection toggle */
        .selection-tabs {
            display: flex;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            padding: 3px;
            margin-bottom: 12px;
            border: 1px solid var(--border);

        .selection-tab {
            flex: 1;
            padding: 6px;
            border-radius: 6px;
            border: none;
            background: transparent;
            color: var(--ink-muted);
            font-family: 'Space Mono', monospace;

            font-weight: 700;

            text-transform: uppercase;
            letter-spacing: 0.1em;

        }

        .selection-tab.active {
            background: var(--surface);
            color: var(--accent);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
        }

        .range-options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .range-opt-group {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 12px;
            background: rgba(7, 9, 15, 0.5);
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            transition: border-color 0.2s;
        }

        .range-opt-group:hover {
            border-color: var(--border-hi);
        }

        .range-opt-group input[type="radio"] {
            margin: 0;
            accent-color: var(--accent);
        }

        .range-opt-label {
            font-size: 11px;
            font-weight: 600;

        .range-custom-input {

            background: var(--surface);
            border: 1px solid var(--border);

            padding: 6px 10px;
            color: var(--ink);
            font-family: 'Space Mono', monospace;

        .analysis-mode-toggle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
        }

        /* hidden utility */
        .hidden {
            display: none !important;
        }
    </style>
</head>

    <script>
        // Global Marked/KaTeX Init
        if (window.marked && window.markedKatex) {
            marked.use(markedKatex({ throwOnError: false }));
        }

        const API_BASE = '';
        const SUPABASE_URL = 'YOUR_SUPABASE_URL';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJjaWp3dXRiYmh4aGh5cGljbXZjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyNDI2NTcsImV4cCI6MjA4ODgxODY1N30.7tPBBaxW7ko6QFZcbYVrsTv15ae6Wv_YVjsvdPJSqhc';

        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const params = new URLSearchParams(window.location.search);
        const CONFIG = {
            url: params.get('file'),
            label: params.get('label') || 'Study Notes',
            topicId: params.get('topicId'),
            topicName: params.get('topicName'),
            subjectName: params.get('subjectName')
        };

        if (window.pdfjsLib) {
            window.pdfjsLib.GlobalWorkerOptions.workerSrc =
                'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
        }

        const notesViewerState = {
            url: '',
            type: '',
            label: CONFIG.label,
            pdfDoc: null,
            pageNum: 1,
            totalPages: 1,
            zoom: 1.0,
            renderedCanvas: null,
            selection: null,
            selectedImageDataUrl: '',
            selecting: false,
            dragStart: null,
            renderToken: 0,
            objectUrl: '',
            chatHistory: [],
            isSelectionAttached: false,
            userName: 'Individual',
            selectionMode: 'crop',
            pageScope: 'current',
            analysisVisualMode: 'visual'
        };

        /* ── Toast ──────────────────────────────────────────────── */
        function showToast(message, type = 'info') {
            const colors = {
                info: 'background:rgba(30,41,59,0.95);color:#e2e8f0;border-color:rgba(255,255,255,0.1)',
                warning: 'background:rgba(245,158,11,0.15);color:#fbbf24;border-color:rgba(245,158,11,0.3)',
                error: 'background:rgba(239,68,68,0.12);color:#f87171;border-color:rgba(239,68,68,0.3)'
            };
            const div = document.createElement('div');
            div.style.cssText = `
                position:fixed; bottom:24px; right:24px; z-index:400;
                padding:10px 18px; border-radius:10px;
                border:1px solid; backdrop-filter:blur(16px);
                font-family:'DM Sans',sans-serif; font-size:13px; font-weight:500;
                box-shadow:0 8px 32px rgba(0,0,0,0.4);
                transform:translateY(20px); opacity:0;
                transition:transform 0.25s ease, opacity 0.25s ease;
                ${colors[type]}
            `;
            div.textContent = message;
            document.body.appendChild(div);
            requestAnimationFrame(() => {
                div.style.transform = 'translateY(0)'; div.style.opacity = '1';
            });
            setTimeout(() => {
                div.style.transform = 'translateY(20px)'; div.style.opacity = '0';
                setTimeout(() => div.remove(), 300);
            }, 3000);
        }

        window.switchSelectionTab = function(mode) {
            notesViewerState.selectionMode = mode;
            document.getElementById('tabCrop').classList.toggle('active', mode === 'crop');
            document.getElementById('tabPages').classList.toggle('active', mode === 'pages');
            document.getElementById('cropModeUi').classList.toggle('hidden', mode !== 'crop');
            document.getElementById('pagesModeUi').classList.toggle('hidden', mode !== 'pages');
            
            // UI Differentiation
            const overlay = document.getElementById('notesDragOverlay');
            if (overlay) overlay.classList.toggle('hidden', mode !== 'crop');
            
            if (mode === 'pages') {
                resetNotesSelectionBox();
            }
        };

        window.updatePageScopeInfo = function() {
            const scope = document.querySelector('input[name="pageScope"]:checked').value;
            notesViewerState.pageScope = scope;
            document.getElementById('customPageRange').classList.toggle('hidden', scope !== 'range');
        };

        function parsePageRange(rangeStr, maxPages) {
            const pages = new Set();
            const parts = rangeStr.split(',');
            for (let part of parts) {
                part = part.trim();
                if (part.includes('-')) {
                    const [start, end] = part.split('-').map(n => parseInt(n.trim()));
                    if (!isNaN(start) && !isNaN(end)) {
                        for (let i = Math.min(start, end); i <= Math.max(start, end); i++) {
                            if (i >= 1 && i <= maxPages) pages.add(i);
                        }
                    }
                } else {
                    const n = parseInt(part);
                    if (!isNaN(n) && n >= 1 && n <= maxPages) pages.add(n);
                }
            }
            return Array.from(pages).sort((a, b) => a - b);
        }

        async function getSelectedPageNumbers() {
            if (notesViewerState.pageScope === 'current') {
                return [notesViewerState.pageNum];
            } else if (notesViewerState.pageScope === 'all') {
                const all = [];
                for (let i = 1; i <= notesViewerState.totalPages; i++) all.push(i);
                return all;
            } else {
                const rangeStr = document.getElementById('customPageRange').value;
                return parsePageRange(rangeStr, notesViewerState.totalPages);
            }
        }

        async function capturePagesAsImages(pages) {
            const dataUrls = [];
            for (const num of pages) {
                if (num < 1 || num > notesViewerState.totalPages) continue;
                try {
                    const page = await notesViewerState.pdfDoc.getPage(num);
                    const viewport = page.getViewport({ scale: 2.0 });
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.height = viewport.height;
                    canvas.width = viewport.width;
                    await page.render({ canvasContext: ctx, viewport: viewport }).promise;
                    dataUrls.push(canvas.toDataURL('image/jpeg', 0.8));
                } catch (e) { console.error(`Render page ${num} err:`, e); }
            }
            return dataUrls;
        }

        async function capturePagesAsText(pages) {
            let fullText = "";
            for (const num of pages) {
                if (num < 1 || num > notesViewerState.totalPages) continue;
                try {
                    const page = await notesViewerState.pdfDoc.getPage(num);
                    const textContent = await page.getTextContent();
                    const pageText = textContent.items.map(item => item.str).join(' ');
                    fullText += `\n[Page ${num}]\n${pageText}\n`;
                } catch (e) { console.error(`Text extraction page ${num} err:`, e); }
            }
            return fullText;
        }

        async function checkAuthState() {
            try {
                const { data: { session } } = await supabaseClient.auth.getSession();
                if (session && session.user) {
                    const user = session.user;
                    const name = user.user_metadata?.full_name || user.email.split('@')[0];
                    notesViewerState.userName = name;
                }
            } catch (err) {
                console.warn('Failed to fetch auth state', err);
            }
        }

        /* ── Utilities ──────────────────────────────────────────── */
        function detectNotesFileType(url) {
            const lower = (url || '').toLowerCase().split('?')[0];
            if (/\.(png|jpg|jpeg|webp|gif|bmp)$/i.test(lower)) return 'image';
            return 'pdf';
        }

        function buildProxiedFileUrl(url) {
            return `${API_BASE}/proxy-file?url=${encodeURIComponent(url)}`;
        }

        function updateNotesViewerControls() {
            document.getElementById('notesPageIndicator').innerText =
                `Page ${notesViewerState.pageNum} / ${notesViewerState.totalPages}`;
            document.getElementById('notesZoomIndicator').innerText =
                `${Math.round(notesViewerState.zoom * 100)}%`;
            document.getElementById('notesPrevPageBtn').disabled =
                notesViewerState.type !== 'pdf' || notesViewerState.pageNum <= 1;
            document.getElementById('notesNextPageBtn').disabled =
                notesViewerState.type !== 'pdf' || notesViewerState.pageNum >= notesViewerState.totalPages;
        }

        function resetNotesSelectionBox() {
            notesViewerState.selection = null;
            notesViewerState.dragStart = null;
            notesViewerState.selecting = false;
            document.getElementById('notesSelectionBox').classList.add('hidden');
            document.getElementById('notesSelectionBadge').classList.add('hidden');
        }

        window.clearNotesSelection = function () {
            resetNotesSelectionBox();
            document.getElementById('notesSelectionPreview').classList.add('hidden');
            document.getElementById('notesSelectionEmpty').classList.remove('hidden');
            notesViewerState.selectedImageDataUrl = '';
        };

        window.clearNotesChat = function () {
            notesViewerState.chatHistory = [];
            const box = document.getElementById('notesAnswerBox');
            box.innerHTML = `
                <div class="chat-empty">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                            d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0012 18.75V19a2.25 2.25 0 01-4.5 0v-.25c0-.98-.378-1.93-1.056-2.607l-.547-.547z"/>
                    </svg>
                    <span>Laboratory Ready</span>
                </div>`;
            document.getElementById('notesAnswerStatus').innerText = 'IDLE';
        };

        /* ── Chat messages ──────────────────────────────────────── */
        function addMessageToChat(role, text) {
            const box = document.getElementById('notesAnswerBox');
            if (notesViewerState.chatHistory.length === 0 && role !== 'loading') {
                box.innerHTML = '';
            }

            const msgDiv = document.createElement('div');
            if (role === 'loading') msgDiv.id = 'notesChatLoading';

            const roleLabel = role === 'user' ? notesViewerState.userName : 'RTU Assistant';
            const cls = role === 'user'
                ? 'chat-msg chat-msg-user'
                : role === 'loading'
                    ? 'chat-msg chat-msg-loading'
                    : 'chat-msg chat-msg-ai';
            msgDiv.className = cls;

            const roleDiv = document.createElement('div');
            roleDiv.className = 'chat-msg-role';
            roleDiv.innerText = roleLabel;

            const textDiv = document.createElement('div');
            // Remove pre-wrap for markdown as it breaks block rendering
            if (role === 'ai') {
                textDiv.style.whiteSpace = 'normal';
            } else {
                textDiv.style.whiteSpace = 'pre-wrap';
            }

            if (role === 'loading') {
                textDiv.innerHTML = `Thinking<span class="loading-dots"><span></span><span></span><span></span></span>`;
            } else if (role === 'ai') {
                textDiv.innerHTML = marked.parse(text);
                textDiv.classList.add('markdown-body');
            } else {
                textDiv.innerText = text;
            }

            msgDiv.appendChild(roleDiv);
            msgDiv.appendChild(textDiv);
            box.appendChild(msgDiv);
            setTimeout(() => box.scrollTo({ top: box.scrollHeight, behavior: 'smooth' }), 50);

            if (role !== 'loading') {
                notesViewerState.chatHistory.push({
                    role: role === 'user' ? 'user' : 'model',
                    text
                });
            }
        }

        /* ── Pointer / selection ────────────────────────────────── */
        function getPointerPositionOnCanvas(event) {
            const canvas = document.getElementById('notesViewerCanvas');
            const rect = canvas.getBoundingClientRect();
            return {
                x: Math.max(0, Math.min(rect.width, event.clientX - rect.left)),
                y: Math.max(0, Math.min(rect.height, event.clientY - rect.top))
            };
        }

        function captureCrop() {
            const canvas = notesViewerState.renderedCanvas;
            const sel = notesViewerState.selection;
            if (!canvas || !sel || sel.w < 10 || sel.h < 10) return;

            const rect = canvas.getBoundingClientRect();
            const sx = canvas.width / rect.width;
            const sy = canvas.height / rect.height;

            const crop = document.createElement('canvas');
            crop.width = sel.w * sx;
            crop.height = sel.h * sy;
            crop.getContext('2d').drawImage(
                canvas, sel.x * sx, sel.y * sy, crop.width, crop.height,
                0, 0, crop.width, crop.height
            );

            const dataUrl = crop.toDataURL('image/png');
            notesViewerState.selectedImageDataUrl = dataUrl;

            const preview = document.getElementById('notesSelectionPreview');
            preview.src = dataUrl;
            preview.classList.remove('hidden');
            document.getElementById('notesSelectionEmpty').classList.add('hidden');

            const input = document.getElementById('notesQuestionInput');
            input.focus();
            input.placeholder = 'What is this section about?';
        }

        function attachSelectionHandlers() {
            if (notesViewerState.isSelectionAttached) return;
            const wrap = document.getElementById('notesViewerCanvasWrap');

            wrap.addEventListener('pointerdown', (e) => {
                if (!notesViewerState.renderedCanvas || notesViewerState.selectionMode !== 'crop') return;
                resetNotesSelectionBox();
                notesViewerState.selecting = true;
                notesViewerState.dragStart = getPointerPositionOnCanvas(e);
                notesViewerState.hasMoved = false;
                document.body.style.userSelect = 'none';
                document.body.style.webkitUserSelect = 'none';
            });

            window.addEventListener('pointermove', (e) => {
                if (!notesViewerState.selecting || !notesViewerState.dragStart) return;
                const current = getPointerPositionOnCanvas(e);
                const dist = Math.hypot(
                    current.x - notesViewerState.dragStart.x,
                    current.y - notesViewerState.dragStart.y
                );
                if (!notesViewerState.hasMoved && dist < 5) return;
                notesViewerState.hasMoved = true;

                const box = document.getElementById('notesSelectionBox');
                const badge = document.getElementById('notesSelectionBadge');
                const x = Math.min(notesViewerState.dragStart.x, current.x);
                const y = Math.min(notesViewerState.dragStart.y, current.y);
                const w = Math.abs(current.x - notesViewerState.dragStart.x);
                const h = Math.abs(current.y - notesViewerState.dragStart.y);

                box.style.cssText += `left:${x}px;top:${y}px;width:${w}px;height:${h}px;`;
                box.classList.remove('hidden');

                badge.style.left = (x + 6) + 'px';
                badge.style.top = (y + 6) + 'px';
                badge.innerText = `${Math.round(w)}×${Math.round(h)}`;
                badge.classList.remove('hidden');
            });

            window.addEventListener('pointerup', (e) => {
                if (!notesViewerState.selecting) return;
                notesViewerState.selecting = false;
                document.body.style.userSelect = '';
                document.body.style.webkitUserSelect = '';

                const end = getPointerPositionOnCanvas(e);
                notesViewerState.selection = {
                    x: Math.min(notesViewerState.dragStart.x, end.x),
                    y: Math.min(notesViewerState.dragStart.y, end.y),
                    w: Math.abs(end.x - notesViewerState.dragStart.x),
                    h: Math.abs(end.y - notesViewerState.dragStart.y)
                };
                captureCrop();
            });

            notesViewerState.isSelectionAttached = true;
        }

        /* ── Renderers ──────────────────────────────────────────── */
        async function renderPdfPage(pageNum) {
            if (!notesViewerState.pdfDoc) return;
            const renderToken = ++notesViewerState.renderToken;
            const canvas = document.getElementById('notesViewerCanvas');
            const ctx = canvas.getContext('2d');
            try {
                const page = await notesViewerState.pdfDoc.getPage(pageNum);
                const outputScale = window.devicePixelRatio || 1;
                const viewport = page.getViewport({ scale: notesViewerState.zoom * 1.5 });
                canvas.width = Math.floor(viewport.width * outputScale);
                canvas.height = Math.floor(viewport.height * outputScale);
                canvas.style.width = `${Math.floor(viewport.width)}px`;
                canvas.style.height = `${Math.floor(viewport.height)}px`;
                ctx.scale(outputScale, outputScale);
                await page.render({ canvasContext: ctx, viewport }).promise;
                if (renderToken !== notesViewerState.renderToken) return;
                notesViewerState.renderedCanvas = canvas;
                updateNotesViewerControls();
                clearNotesSelection();
            } catch (err) {
                console.error('PDF Render Error:', err);
            }
        }

        async function renderImageToCanvas(url) {
            const renderToken = ++notesViewerState.renderToken;
            const image = new Image();
            image.src = url;
            await image.decode();
            if (renderToken !== notesViewerState.renderToken) return;
            const maxWidth = 1600;
            const scale = Math.min(1, maxWidth / image.naturalWidth) * notesViewerState.zoom;
            const canvas = document.getElementById('notesViewerCanvas');
            const ctx = canvas.getContext('2d');
            canvas.width = Math.round(image.naturalWidth * scale);
            canvas.height = Math.round(image.naturalHeight * scale);
            canvas.style.width = `${canvas.width}px`;
            canvas.style.height = `${canvas.height}px`;
            ctx.drawImage(image, 0, 0, canvas.width, canvas.height);
            notesViewerState.renderedCanvas = canvas;
            updateNotesViewerControls();
            clearNotesSelection();
        }

        /* ── Page / zoom controls ───────────────────────────────── */
        window.changeNotesPage = (delta) => {
            const next = notesViewerState.pageNum + delta;
            if (next < 1 || next > notesViewerState.totalPages) return;
            notesViewerState.pageNum = next;
            renderPdfPage(next);
        };

        window.changeNotesZoom = (delta) => {
            notesViewerState.zoom = Math.max(0.4, Math.min(3.0, notesViewerState.zoom + delta));
            if (notesViewerState.type === 'pdf')
                renderPdfPage(notesViewerState.pageNum);
            else
                renderImageToCanvas(notesViewerState.objectUrl || notesViewerState.url);
        };

        /* ── Download ───────────────────────────────────────────── */
        window.downloadOriginalFile = async () => {
            if (!CONFIG.url) return;
            try {
                showToast('Preparing download…', 'info');
                const proxied = buildProxiedFileUrl(CONFIG.url);
                const res = await fetch(proxied);
                if (!res.ok) throw new Error();
                const blob = await res.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = url;
                a.download = CONFIG.label.replace(/[^a-z0-9]/gi, '_').toLowerCase()
                    + (notesViewerState.type === 'pdf' ? '.pdf' : '.jpg');
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                showToast('Download started!', 'info');
            } catch (err) {
                console.error('Download Error:', err);
                showToast('Download failed. Try "Open Original" instead.', 'error');
            }
        };

        /* ── Keyboard handlers ──────────────────────────────────── */
        window.handleNotesInitialKey = (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                askNotesSelectionQuestion();
            }
        };

        window.handleNotesChatKey = (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendNotesChatReply();
            }
        };

        window.sendNotesChatReply = () => {
            const input = document.getElementById('notesChatInput');
            const val = input.value.trim();
            if (!val) return;
            document.getElementById('notesQuestionInput').value = val;
            askNotesSelectionQuestion();
            input.value = '';
            input.style.height = 'auto';
        };

        /* ── AI Ask ─────────────────────────────────────────────── */
        async function askNotesSelectionQuestion() {
            const topInput = document.getElementById('notesQuestionInput');
            const chatInput = document.getElementById('notesChatInput');
            const question = (chatInput.value.trim() || topInput.value.trim());
            
            if (!question) return;

            // Validation based on mode
            if (notesViewerState.selectionMode === 'crop' && !notesViewerState.selectedImageDataUrl) {
                showToast("Please capture a portion of the notes first.", "warning");
                return;
            }

            // Clear inputs
            topInput.value = '';
            chatInput.value = '';
            chatInput.style.height = 'auto';

            addMessageToChat('user', question);
            addMessageToChat('loading', 'Thinking...');

            const status = document.getElementById('notesAnswerStatus');
            if (status) status.innerText = 'Analyzing…';

            try {
                const payload = {
                    topic_id: CONFIG.topicId,
                    topic_name: CONFIG.topicName,
                    subject_name: CONFIG.subjectName,
                    question: question,
                    source_label: CONFIG.label,
                    history: notesViewerState.chatHistory.slice(0, -1)
                };

                if (notesViewerState.selectionMode === 'crop') {
                    payload.image_data_url = notesViewerState.selectedImageDataUrl;
                } else {
                    const pages = await getSelectedPageNumbers();
                    if (pages.length === 0) {
                        const loading = document.getElementById('notesChatLoading');
                        if (loading) loading.remove();
                        showToast("Please select a valid page range.", "warning");
                        return;
                    }

                    const analysisMode = document.getElementById('analysisVisualMode').value;
                    if (analysisMode === 'visual') {
                        if (pages.length > 10) {
                            showToast("Visual mode is limited to 10 pages. Using Text mode for efficiency.", "info");
                            payload.text_content = await capturePagesAsText(pages);
                        } else {
                            // Send BOTH for better fallback resilience
                            payload.image_data_urls = await capturePagesAsImages(pages);
                            payload.text_content = await capturePagesAsText(pages);
                        }
                    } else {
                        payload.text_content = await capturePagesAsText(pages);
                    }
                }

                const { data: { session } } = await supabaseClient.auth.getSession();
                const headers = { 'Content-Type': 'application/json' };
                if (session) headers['Authorization'] = `Bearer ${session.access_token}`;

                const response = await fetch(`${API_BASE}/ask-notes-selection`, {
                    method: 'POST',
                    headers: headers,
                    body: JSON.stringify(payload)
                });

                const loading = document.getElementById('notesChatLoading');
                if (loading) loading.remove();

                if (!response.ok) {
                    const errData = await response.json();
                    throw new Error(errData.detail || "Failed to analyze document.");
                }
                
                const data = await response.json();
                addMessageToChat('ai', data.answer);
                if (status) status.innerText = 'Complete';

            } catch (err) {
                console.error("AI Ask Error:", err);
                const loading = document.getElementById('notesChatLoading');
                if (loading) loading.remove();
                addMessageToChat('ai', `I'm sorry, I couldn't process that request: ${err.message}`);
                if (status) status.innerText = 'Error';
            }
        };

        /* ── Init ───────────────────────────────────────────────── */
        async function initViewer() {
            await checkAuthState();
            if (!CONFIG.url) return;

            document.getElementById('viewerTitle').innerText = CONFIG.label;
            const extLink = document.getElementById('notesExternalLink');
            extLink.href = CONFIG.url;
            extLink.style.display = 'flex';

            notesViewerState.type = detectNotesFileType(CONFIG.url);
            const proxied = buildProxiedFileUrl(CONFIG.url);

            try {
                const res = await fetch(proxied);
                if (!res.ok) throw new Error();

                if (notesViewerState.type === 'pdf') {
                    const data = new Uint8Array(await res.arrayBuffer());
                    notesViewerState.pdfDoc = await window.pdfjsLib.getDocument({ data }).promise;
                    notesViewerState.totalPages = notesViewerState.pdfDoc.numPages;
                    await renderPdfPage(1);
                } else {
                    const blob = await res.blob();
                    notesViewerState.objectUrl = URL.createObjectURL(blob);
                    await renderImageToCanvas(notesViewerState.objectUrl);
                }
                attachSelectionHandlers();
            } catch (e) {
                showToast('Could not load the file. Try "Open Original".', 'error');
            } finally {
                const loader = document.getElementById('loadingOverlay');
                loader.style.opacity = '0';
                loader.style.visibility = 'hidden';
                loader.style.pointerEvents = 'none';
                setTimeout(() => loader.remove(), 600);
            }
        }

        /* ── Global keyboard shortcuts ──────────────────────────── */
        window.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') return;
            switch (e.key) {
                case 'ArrowLeft': changeNotesPage(-1); break;
                case 'ArrowRight': changeNotesPage(1); break;
                case '+': case '=': changeNotesZoom(0.2); break;
                case '-': case '_': changeNotesZoom(-0.2); break;
                case 'Escape': clearNotesSelection(); break;
            }
        });

        window.addEventListener('load', initViewer);
    </script>
</body>
